<!-- Login Container -->
<main class="relative z-20 w-full max-w-[480px] animate-fade-in">
<!-- Brand Header -->
<header class="text-center mb-12">
<h1 class="font-headline-md text-headline-md text-antique-gold tracking-tighter mb-2">
                DUBAI FISTAN SARAYI
            </h1>
<div class="h-[1px] w-12 bg-antique-gold mx-auto opacity-50 mb-6"></div>
<h2 class="font-title-lg text-title-lg text-silk-white uppercase tracking-[0.2em]">
                Yönetim Paneli Girişi
            </h2>
</header>
<!-- Login Card -->
<div class="glass-panel golden-glow p-10 md:p-12 rounded-lg flex flex-col gap-8">
<form class="flex flex-col gap-8">
<!-- Error Message -->
<div id="login-error" class="hidden bg-error/10 border border-error/20 text-error text-xs p-3 rounded-sm text-center uppercase tracking-widest">
    Kullanıcı adı veya parola hatalı.
</div>
<!-- Username -->
<div class="relative flex flex-col gap-2 group">
<label class="font-label-md text-label-md text-outline uppercase" for="username">
                        Kullanıcı Adı
                    </label>
<input class="bg-transparent border-b border-outline-variant py-3 px-1 text-silk-white focus:outline-none focus:border-antique-gold transition-all duration-300 placeholder:text-surface-variant" id="username" name="username" placeholder="admin_saray" required="" type="text">
</div>
<!-- Password -->
<div class="relative flex flex-col gap-2 group">
<label class="font-label-md text-label-md text-outline uppercase" for="password">
                        Parola
                    </label>
<input class="bg-transparent border-b border-outline-variant py-3 px-1 text-silk-white focus:outline-none focus:border-antique-gold transition-all duration-300 placeholder:text-surface-variant" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-5 h-5 border border-antique-gold/50 rounded-sm checked:bg-antique-gold transition-all" type="checkbox">
<span class="material-symbols-outlined absolute text-deep-obsidian text-[16px] opacity-0 peer-checked:opacity-100 font-bold">check</span>
</div>
<span class="font-label-md text-[12px] text-on-surface-variant uppercase group-hover:text-silk-white transition-colors">Beni Hatırla</span>
</label>
<a class="font-label-md text-[12px] text-antique-gold hover:text-silk-white transition-colors uppercase" href="#">
                        Şifremi Unuttum
                    </a>
</div>

<button class="shimmer-effect bg-antique-gold text-deep-obsidian font-label-md py-4 rounded-sm tracking-[0.2em] transition-transform active:scale-95 hover:scale-[1.02] duration-200" type="submit">
                    GİRİŞ YAP
                </button>
</form>

<!-- Interactive Atmospheric Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const background = document.querySelector('.fixed.inset-0 div:nth-child(2)');
            background.style.transform = `scale(1.05) translate(${(x - 0.5) * 10}px, ${(y - 0.5) * 10}px)`;
        });

        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = form.querySelector('button');

            // Admin Credentials Check
            if (username === 'admin' && password === 'dubai123') {
                errorDiv.classList.add('hidden');
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-deep-obsidian">progress_activity</span>';
                btn.disabled = true;

                setTimeout(() => {
                    btn.innerHTML = 'DOĞRULANIYOR...';
                    btn.classList.add('opacity-80');
                    setTimeout(() => {
                        window.location.href = "../dubai_fistan_saray_b_t_nle_ik_proje_merkezi/code.html";
                    }, 1000);
                }, 600);
            } else {
                errorDiv.classList.remove('hidden');
                // Shake effect animation
                form.parentElement.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        });
    </script>
